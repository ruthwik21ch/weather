<!DOCTYPE html>
<html lang="en">
<head>
    <title>Weather App</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0f1e">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0f1e;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #5ee7ff;
            --accent2: #a78bfa;
            --text: #f0f4ff;
            --muted: rgba(240,244,255,0.45);
            --card-bg: rgba(255,255,255,0.05);
            --glow: 0 0 40px rgba(94,231,255,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(94,231,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(167,139,250,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(10,15,30,0) 0%, var(--bg) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Stars */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 55% 20%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 90% 75%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.3) 0%, transparent 100%);
            z-index: 0;
            pointer-events: none;
            animation: twinkle 6s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px 60px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 44px;
            animation: fadeDown 0.7s ease both;
        }

        .header .eyebrow {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.05;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search */
        .search-wrap {
            width: 100%;
            max-width: 480px;
            animation: fadeDown 0.7s 0.1s ease both;
        }

        form {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 8px;
            backdrop-filter: blur(16px);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        form:focus-within {
            border-color: rgba(94,231,255,0.3);
            box-shadow: var(--glow);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: var(--text);
            padding: 10px 14px;
        }

        input::placeholder { color: var(--muted); }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0f1e;
            border: none;
            border-radius: 12px;
            padding: 10px 22px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        button:hover { opacity: 0.88; transform: scale(0.98); }
        button:active { transform: scale(0.95); }

        /* Error */
        .error-msg {
            margin-top: 20px;
            color: #ff7eb3;
            font-size: 14px;
            opacity: 0.9;
            animation: fadeUp 0.4s ease both;
        }

        /* Weather Card */
        .weather-card {
            width: 100%;
            max-width: 480px;
            margin-top: 32px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px 32px 32px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s 0.05s ease both;
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(94,231,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .city-name {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .weather-desc {
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .temp-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 16px rgba(94,231,255,0.4));
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .temp-value {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .temp-unit {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--muted);
            align-self: flex-start;
            margin-top: 10px;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.25s, background 0.25s;
        }

        .stat-chip:hover {
            border-color: rgba(94,231,255,0.2);
            background: rgba(94,231,255,0.05);
        }

        .stat-icon {
            font-size: 22px;
            line-height: 1;
            flex-shrink: 0;
        }

        .stat-info {}

        .stat-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Mobile tweaks */
        @media (max-width: 420px) {
            .page-wrapper { padding: 36px 16px 48px; }
            .weather-card { padding: 28px 20px 24px; border-radius: 22px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="header">
        <p class="eyebrow">Live Forecast</p>
        <h1>Weather<br>Dashboard</h1>
    </div>

    <div class="search-wrap">
        <form method="POST">
            <input type="text" name="city" placeholder="Search city…" required autocomplete="off">
            <button type="submit">Search</button>
        </form>
    </div>

    {% if error %}
    <p class="error-msg">⚠ {{ error }}</p>
    {% endif %}

    {% if weather %}
    <div class="weather-card">

        <div class="city-name">{{ weather.city }}</div>
        <div class="weather-desc">{{ weather.desc }}</div>

        <div class="temp-row">
            <img
                class="weather-icon"
                src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
                alt="{{ weather.desc }}"
            >
            <div style="display:flex; align-items:flex-start; gap:4px;">
                <span class="temp-value">{{ weather.temp }}</span>
                <span class="temp-unit">°C</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="stats-grid">
            <div class="stat-chip">
                <span class="stat-icon">💧</span>
                <div class="stat-info">
                    <div class="stat-label">Humidity</div>
                    <div class="stat-value">{{ weather.humidity }}%</div>
                </div>
            </div>
            <div class="stat-chip">
                <span class="stat-icon">🌬</span>
                <div class="stat-info">
                    <div class="stat-label">Wind</div>
                    <div class="stat-value">{{ weather.wind }} m/s</div>
                </div>
            </div>
        </div>

    </div>
    {% endif %}

</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js');
}
</script>
</body>
</html>
